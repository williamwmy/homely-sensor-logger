# Uten tak vokser container-loggene til de spiser disken.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 12

  migrate:
    image: postgres:16
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD}
    volumes:
      - ./db/migrate.sh:/migrate.sh:ro
      - ./db/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]

  collector:
    build: ./collector
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      HOMELY_USERNAME: ${HOMELY_USERNAME}
      HOMELY_PASSWORD: ${HOMELY_PASSWORD}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-120}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}

  notifier:
    build: ./collector
    command: ["node", "src/notifier.js"]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL:-https://ntfy.sh}
      NTFY_TOPIC_SECRET: ${NTFY_TOPIC_SECRET}
      NOTIFY_IGNORE_DEVICES: ${NOTIFY_IGNORE_DEVICES:-}
      NOTIFY_MAX_AGE_SECONDS: ${NOTIFY_MAX_AGE_SECONDS:-900}
      HEARTBEAT_HOUR: ${HEARTBEAT_HOUR:-8}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}

  met:
    build: ./collector
    command: ["node", "src/met.js"]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      FROST_CLIENT_ID: ${FROST_CLIENT_ID:-}
      MET_STATION_ID: ${MET_STATION_ID:-SN18700}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}

  netatmo:
    build: ./collector
    command: ["node", "src/netatmo.js"]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NETATMO_CLIENT_ID: ${NETATMO_CLIENT_ID:-}
      NETATMO_CLIENT_SECRET: ${NETATMO_CLIENT_SECRET:-}
      NETATMO_REFRESH_TOKEN: ${NETATMO_REFRESH_TOKEN:-}
      NETATMO_LAT: ${NETATMO_LAT:-59.914}
      NETATMO_LON: ${NETATMO_LON:-10.785}
      NETATMO_NEAREST: ${NETATMO_NEAREST:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      migrate:
        condition: service_completed_successfully
    # Port 3000 er ikke åpnet i NSG-en — kun nåbar via Tailscale/localhost.
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  grafana-data:
